name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Zip (for "Load unpacked" installs) ───────────────────────────────────
      - name: Create zip
        run: |
          zip -r tax-code-verifier-${{ github.ref_name }}.zip . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "docs/*" \
            --exclude "plans/*" \
            --exclude "*.DS_Store" \
            --exclude "__MACOSX/*"

      # ── CRX (signed, for drag-and-drop install in Developer mode) ────────────
      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Decode signing key
        run: echo "${{ secrets.CRX_PRIVATE_KEY }}" | base64 -d > key.pem

      - name: Pack CRX
        run: |
          google-chrome-stable \
            --pack-extension=. \
            --pack-extension-key=./key.pem \
            --no-sandbox
          mv tax-code-verifier.crx tax-code-verifier-${{ github.ref_name }}.crx

      - name: Clean up key
        if: always()
        run: rm -f key.pem

      # ── GitHub Release ────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            tax-code-verifier-${{ github.ref_name }}.zip
            tax-code-verifier-${{ github.ref_name }}.crx
